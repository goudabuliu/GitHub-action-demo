name: Serverless Devs Project CI/CD

on:
  push:
    branches: [master]
  workflow_dispatch:  # 手动触发

jobs:
  serverless-devs-cd:
    runs-on: ubuntu-latest
    steps:
      # 步骤1：拉取代码（仅拉代码，不处理依赖）
      - uses: actions/checkout@v4

      # 步骤2：仅安装 Node.js（只为了装 s 工具，关闭 npm 缓存）
      - uses: actions/setup-node@v4
        with:
          node-version: 24  # LTS 版本
          registry-url: https://registry.npmjs.org/
          # 删掉 cache: 'npm' —— 你不需要 npm 缓存

      # 步骤3：直接全局安装 Serverless Devs（跳过项目依赖安装）
      - name: Install Serverless Devs
        run: |
          # 用淘宝源加速全局安装，避免超时
          npm config set registry https://registry.npmmirror.com/
          npm install -g @serverless-devs/s  # 指定稳定版本

      # 步骤4：配置阿里云密钥（适配子账号）
      - name: Configure Serverless Devs
        env:
          ACCOUNT_ID: ${{ secrets.ALIYUN_ACCOUNT_ID }}
          REGION: ${{ secrets.ALIYUN_REGION }}
        run: |
          s config add \
            --AccessKeyID ${{ secrets.ACCESSKEYID }} \
            --AccessKeySecret ${{ secrets.ACCESSKEYSECRET }} \
            --AccountID $ACCOUNT_ID \
            --Region $REGION \
            -a default -f

      # 步骤5：部署到 FC
      - name: Deploy to Aliyun FC
        run: s deploy -y --use-local --debug

      # 步骤6：验证部署（可选）
      - name: Verify deployment
        run: |
          sleep 10
          FC_URL=$(s info --output json | jq -r '.outputs[0].value // "unknown"')
          if [ "$FC_URL" != "unknown" ] && curl -s --connect-timeout 5 $FC_URL; then
            echo "✅ 部署验证成功！FC 地址：$FC_URL"
          else
            echo "⚠️ 部署验证跳过（未获取到 FC 地址）"
          fi