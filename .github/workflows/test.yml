name: Serverless Devs Project CI/CD

on:
  push:
    branches: [master]
  workflow_dispatch:  # 手动触发

jobs:
  serverless-devs-cd:
    runs-on: ubuntu-latest
    steps:
      # 步骤1：拉取代码（仅拉代码，不处理依赖）
      - uses: actions/checkout@v4

      # 步骤2：仅安装 Node.js（只为了装 s 工具，关闭 npm 缓存）
      - uses: actions/setup-node@v4
        with:
          node-version: 24  # LTS 版本
          registry-url: https://registry.npmjs.org/
          # 删掉 cache: 'npm' —— 你不需要 npm 缓存

      # 步骤3：直接全局安装 Serverless Devs（跳过项目依赖安装）
      - name: Install Serverless Devs
        run: |
          # 用淘宝源加速全局安装，避免超时
          npm config set registry https://registry.npmmirror.com/
          npm install -g @serverless-devs/s@3.1.10

      # 步骤4：配置阿里云密钥（适配子账号）
      - name: Configure Serverless Devs
        run: |
          s config add \
            --AccessKeyID ${{ secrets.ACCESSKEYID }} \
            --AccessKeySecret ${{ secrets.ACCESSKEYSECRET }} \
            -a default -f

      # 5. 关键：安装 FC 组件（3.x 必须手动装）
      - name: Install FC Component
        run: s install fc -y  # 自动安装 fc 组件
      
      # 步骤5：部署到 FC
      - name: Deploy to Aliyun FC
        env:
          ALIYUN_ACCOUNT_ID: ${{ secrets.ALIYUN_ACCOUNT_ID }}
          ALIYUN_REGION: ${{ secrets.ALIYUN_REGION }}
        run: s deploy -y --use-local --debug
