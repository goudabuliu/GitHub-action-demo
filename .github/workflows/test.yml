name: Serverless Devs Project CI/CD

on:
  push:
    branches: [master]
  workflow_dispatch:  # 手动触发

jobs:
  serverless-devs-cd:
    runs-on: ubuntu-latest
    steps:
      # 步骤1：拉取代码（仅拉代码，不处理依赖）
      - uses: actions/checkout@v4

      # 步骤2：仅安装 Node.js（只为了装 s 工具，关闭 npm 缓存）
      - uses: actions/setup-node@v4
        with:
          node-version: 24  # LTS 版本
          registry-url: https://registry.npmjs.org/
          # 删掉 cache: 'npm' —— 你不需要 npm 缓存

      # 步骤3：直接全局安装 Serverless Devs（跳过项目依赖安装）
      - name: Install Serverless Devs
        run: |
          # 用淘宝源加速全局安装，避免超时
          npm config set registry https://registry.npmmirror.com/
          npm install -g @serverless-devs/s@3.1.10

      # 步骤4：安装Python 3.10（与FC3运行时匹配）
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      # 步骤5：安装Python依赖（关键：解决ModuleNotFoundError）
      - name: Install Python dependencies
        run: |
          # 安装requirements.txt中的依赖到当前目录
          pip install -r requirements.txt -t . --upgrade

          # 验证安装
          echo "验证FastAPI安装："
          python -c "import fastapi; print('FastAPI version:', fastapi.__version__)" || echo "FastAPI未安装"
          echo "依赖安装完成"

      # 步骤6：配置阿里云密钥（适配子账号）
      - name: Configure Serverless Devs
        run: |
          s config add \
            --AccessKeyID ${{ secrets.ACCESSKEYID }} \
            --AccessKeySecret ${{ secrets.ACCESSKEYSECRET }} \
            -a default -f

      # 步骤7：安装 FC 组件（3.x 必须手动装）
      - name: Install FC Component
        run: s add devsapp/fc3 -y  # 核心：用 devsapp/fc 替代 fc，这是 3.x 组件的完整名称
      
      # 步骤8：部署到 FC
      - name: Deploy to Aliyun FC
        run: |
          s deploy -y --debug
