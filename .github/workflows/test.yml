name: Serverless Devs Project CI/CD

on:
  push:
    branches: [master]
  # 可选：手动触发部署（方便测试）
  workflow_dispatch:

jobs:
  serverless-devs-cd:
    runs-on: ubuntu-latest
    steps:
      # 步骤1：拉取代码（升级到 v4，更稳定）
      - uses: actions/checkout@v4

      # 步骤2：配置 Node 环境（升级到 LTS 版本，缓存依赖）
      - uses: actions/setup-node@v4
        with:
          node-version: 20  # 升级到 Node 20（LTS 长期支持）
          registry-url: https://registry.npmjs.org/
          cache: 'npm'  # 缓存 node_modules，加速部署

      # 步骤3：安装依赖（国内源加速，避免超时）
      - name: Install dependencies
        run: |
          npm config set registry https://registry.npmmirror.com/  # 淘宝源加速
          npm install --no-fund --no-audit

      # 步骤4：安装 Serverless Devs（指定版本，避免兼容性问题）
      - name: Install Serverless Devs
        run: npm install -g @serverless-devs/s@3.2.0  # 指定稳定版本

      # 步骤5：配置阿里云密钥（适配子账号，指定主账号 ID）
      - name: Configure Serverless Devs
        env:
          ACCOUNT_ID: ${{ secrets.ALIYUN_ACCOUNT_ID }}  # 主账号 ID（子账号必配）
          REGION: ${{ secrets.ALIYUN_REGION }}          # 地域（如 cn-hangzhou）
        run: |
          # 配置阿里云密钥（-a default 指定默认密钥别名）
          s config add \
            --AccessKeyID ${{ secrets.AccessKeyID }} \
            --AccessKeySecret ${{ secrets.AccessKeySecret }} \
            --AccountID $ACCOUNT_ID \
            --Region $REGION \
            -a default -f

      # 步骤6：部署到 FC（增加日志输出，方便排查）
      - name: Deploy to Aliyun FC
        run: |
          s deploy -y --use-local --debug  # --debug 输出详细日志

      # 步骤7：验证部署结果（关键：确保服务可用）
      - name: Verify deployment
        run: |
          # 等待 FC 部署生效（根据项目复杂度调整时长）
          sleep 10
          # 从 s.yaml 中提取 FC 触发器地址（需确保 s.yaml 配置了 outputs）
          # 若未配置 outputs，可手动替换为你的 FC 访问地址
          FC_URL=$(s info --output json | jq -r '.outputs[0].value')
          
          # 验证接口可用性
          if curl -s --connect-timeout 5 $FC_URL | grep -q "success"; then
            echo "✅ 部署验证成功！FC 访问地址：$FC_URL"
          else
            echo "❌ 部署验证失败！访问地址：$FC_URL"
            exit 1
          fi
