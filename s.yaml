edition: 3.0.0
name: fc-fastapi-demo
access: default

resources:
  fc-fastapi:
    component: fc3
    props:
      # 基础配置（必填：替换主账号 ID）
      region: ${ALIYUN_REGION}  # 从环境变量读取区域（适配子账号）
      accountId: ${ALIYUN_ACCOUNT_ID}  # 从环境变量读取主账号 ID（适配子账号）

      # 服务/函数配置（FastAPI 适配）
      serviceName: fc-fastapi-service
      functionName: fc-fastapi-function
      runtime: python3.10  # FastAPI 推荐用 python3.10
      handler: app.handler  # 入口：app.py 的 handler 函数
      code: ./           # 代码目录（仓库根目录）
      installDependency: true  # 自动安装 requirements.txt 依赖（关键！）
      
      timeout: 30           # 超时时间
      memorySize: 256       # 内存（FastAPI 建议 256M）
      
      # HTTP 触发器（匿名访问）
      triggers:
        - triggerName: http-trigger
          triggerType: http
          triggerConfig:
            authType: anonymous
            methods: ["GET", "POST"]